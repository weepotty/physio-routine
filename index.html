<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Fix My Hip</title>
<style>
  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: linear-gradient(160deg, #f0f4ff 0%, #e8f0fe 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 0 0 40px;
  }

  /* ── Home screen ─────────────────────────────── */

  #home-screen {
    width: 100%;
    max-width: 480px;
  }

  .home-hero {
    background: linear-gradient(150deg, #1e2d5a 0%, #2d3f80 100%);
    padding: 48px 28px 36px;
    text-align: center;
    color: white;
  }

  .home-hero h1 {
    font-size: 30px;
    font-weight: 800;
    letter-spacing: -0.5px;
    margin-bottom: 6px;
  }

  .home-hero p {
    font-size: 15px;
    opacity: 0.7;
    font-weight: 500;
  }

  .home-list-card {
    background: white;
    margin: -1px 16px 0;
    border-radius: 18px;
    box-shadow: 0 8px 30px rgba(30, 45, 90, 0.13);
    overflow: hidden;
    position: relative;
    top: -16px;
  }

  .exercise-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 15px 20px;
    cursor: pointer;
    border-bottom: 1px solid #f0f2f8;
    transition: background 0.15s;
    -webkit-tap-highlight-color: transparent;
    text-align: left;
  }

  .exercise-item:last-child {
    border-bottom: none;
  }

  .exercise-item:hover,
  .exercise-item:active {
    background: #f5f7ff;
  }

  .exercise-badge {
    flex-shrink: 0;
    width: 28px;
    height: 28px;
    border-radius: 8px;
    background: #eef0fd;
    color: #3d52c7;
    font-size: 13px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .exercise-item-title {
    flex: 1;
    font-size: 15px;
    font-weight: 500;
    color: #1a1f36;
  }

  .exercise-chevron {
    flex-shrink: 0;
    color: #c0c5d8;
    font-size: 18px;
    font-weight: 400;
    line-height: 1;
  }

  /* ── Exercise screen ─────────────────────────── */

  #exercise-screen {
    display: none;
    width: 100%;
    max-width: 480px;
    padding: 20px 16px 0;
  }

  .card {
    background: white;
    border-radius: 20px;
    box-shadow: 0 8px 30px rgba(30, 45, 90, 0.13);
    overflow: hidden;
  }

  /* Progress bar */
  .progress-bar-track {
    height: 4px;
    background: #eef0fd;
    width: 100%;
  }

  .progress-bar-fill {
    height: 4px;
    background: linear-gradient(90deg, #4f63d2, #7c8ff0);
    transition: width 0.35s ease;
  }

  /* Card header row */
  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px 0;
  }

  .btn-home {
    background: none;
    border: none;
    font-size: 20px;
    color: #8892c0;
    cursor: pointer;
    padding: 4px 6px;
    border-radius: 8px;
    line-height: 1;
    transition: background 0.15s, color 0.15s;
    -webkit-tap-highlight-color: transparent;
  }

  .btn-home:hover {
    background: #f0f2ff;
    color: #3d52c7;
  }

  #progress-text {
    font-size: 13px;
    font-weight: 600;
    color: #8892c0;
    letter-spacing: 0.3px;
  }

  /* Card body */
  .card-body {
    padding: 12px 24px 24px;
    text-align: center;
  }

  #title {
    font-size: 24px;
    font-weight: 800;
    color: #1a1f36;
    letter-spacing: -0.4px;
    margin-bottom: 6px;
    line-height: 1.2;
  }

  #desc {
    font-size: 14px;
    color: #7a82a6;
    margin-bottom: 20px;
    line-height: 1.45;
  }

  #main {
    font-size: 46px;
    font-weight: 800;
    color: #1a1f36;
    letter-spacing: -1px;
    line-height: 1.05;
    margin-bottom: 4px;
  }

  #sub {
    font-size: 14px;
    color: #7a82a6;
    font-weight: 500;
    min-height: 20px;
    margin-bottom: 4px;
  }

  /* Rep section */
  .rep-section {
    margin-top: 16px;
  }

  .rep-label {
    font-size: 12px;
    font-weight: 600;
    color: #a0a8c8;
    letter-spacing: 0.6px;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .rep-btn {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    font-size: 40px;
    font-weight: 800;
    background: linear-gradient(145deg, #4f63d2, #3d52c7);
    color: white;
    border: none;
    cursor: pointer;
    display: block;
    margin: 0 auto;
    line-height: 1;
    box-shadow: 0 4px 16px rgba(79, 99, 210, 0.35);
    transition: transform 0.1s, box-shadow 0.1s;
    -webkit-tap-highlight-color: transparent;
  }

  .rep-btn:active {
    transform: scale(0.93);
    box-shadow: 0 2px 8px rgba(79, 99, 210, 0.25);
  }

  .rep-reset {
    background: none;
    color: #b0b8d8;
    font-size: 13px;
    padding: 6px 14px;
    margin-top: 8px;
    border: none;
    cursor: pointer;
    transition: color 0.15s;
  }

  .rep-reset:hover {
    color: #7a82a6;
  }

  /* Timer controls */
  .btn-timer {
    width: 140px;
    padding: 14px 24px;
    font-size: 16px;
    font-weight: 700;
    border-radius: 12px;
    border: none;
    background: linear-gradient(135deg, #4f63d2, #3d52c7);
    color: white;
    cursor: pointer;
    box-shadow: 0 4px 14px rgba(79, 99, 210, 0.3);
    transition: opacity 0.15s, box-shadow 0.15s;
    -webkit-tap-highlight-color: transparent;
    display: block;
    margin: 0 auto;
  }

  .btn-timer:hover {
    opacity: 0.92;
    box-shadow: 0 6px 18px rgba(79, 99, 210, 0.38);
  }

  /* Embedded video */
  .video-embed {
    display: block;
    width: 100%;
    margin-top: 16px;
    border: none;
    border-radius: 10px;
    background: #000;
  }

  .video-embed.regular {
    aspect-ratio: 16 / 9;
  }

  .video-embed.short {
    aspect-ratio: 9 / 16;
    max-height: 380px;
    width: auto;
    max-width: 215px;
    margin-left: auto;
    margin-right: auto;
  }

  /* Nav */
  .nav {
    display: flex;
    gap: 10px;
    margin-top: 24px;
  }

  .btn-secondary {
    flex: 1;
    padding: 15px 20px;
    font-size: 16px;
    font-weight: 600;
    border-radius: 12px;
    border: 2px solid #dde1f0;
    background: white;
    color: #4a5280;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    -webkit-tap-highlight-color: transparent;
  }

  .btn-secondary:hover {
    background: #f5f7ff;
    border-color: #c0c8e8;
  }

  .btn-primary {
    flex: 1;
    padding: 15px 20px;
    font-size: 16px;
    font-weight: 700;
    border-radius: 12px;
    border: none;
    background: linear-gradient(135deg, #4f63d2, #3d52c7);
    color: white;
    cursor: pointer;
    box-shadow: 0 4px 14px rgba(79, 99, 210, 0.3);
    transition: opacity 0.15s, box-shadow 0.15s;
    -webkit-tap-highlight-color: transparent;
  }

  .btn-primary:hover {
    opacity: 0.92;
    box-shadow: 0 6px 18px rgba(79, 99, 210, 0.38);
  }

  .btn-restart {
    background: none;
    color: #c0c8d8;
    font-size: 13px;
    padding: 8px 16px;
    margin-top: 12px;
    border: 1px solid #e8ebf5;
    border-radius: 8px;
    cursor: pointer;
    display: block;
    margin-left: auto;
    margin-right: auto;
    transition: color 0.15s, border-color 0.15s;
  }

  .btn-restart:hover {
    color: #7a82a6;
    border-color: #c8cee0;
  }
</style>
</head>

<body>

<!-- Home screen -->
<div id="home-screen">
  <div class="home-hero">
    <h1>Fix My Hip</h1>
    <p>10 exercises</p>
  </div>
  <div class="home-list-card">
    <div class="exercise-item" data-index="0" onclick="goToExercise(0)">
      <span class="exercise-badge">1</span>
      <span class="exercise-item-title">Hip mobility</span>
      <span class="exercise-chevron">›</span>
    </div>
    <div class="exercise-item" data-index="1" onclick="goToExercise(1)">
      <span class="exercise-badge">2</span>
      <span class="exercise-item-title">Hip rolling</span>
      <span class="exercise-chevron">›</span>
    </div>
    <div class="exercise-item" data-index="2" onclick="goToExercise(2)">
      <span class="exercise-badge">3</span>
      <span class="exercise-item-title">Glute bridge single leg</span>
      <span class="exercise-chevron">›</span>
    </div>
    <div class="exercise-item" data-index="3" onclick="goToExercise(3)">
      <span class="exercise-badge">4</span>
      <span class="exercise-item-title">Single leg squat</span>
      <span class="exercise-chevron">›</span>
    </div>
    <div class="exercise-item" data-index="4" onclick="goToExercise(4)">
      <span class="exercise-badge">5</span>
      <span class="exercise-item-title">Copenhagen plank</span>
      <span class="exercise-chevron">›</span>
    </div>
    <div class="exercise-item" data-index="5" onclick="goToExercise(5)">
      <span class="exercise-badge">6</span>
      <span class="exercise-item-title">Split stance hinge</span>
      <span class="exercise-chevron">›</span>
    </div>
    <div class="exercise-item" data-index="6" onclick="goToExercise(6)">
      <span class="exercise-badge">7</span>
      <span class="exercise-item-title">Drop jump</span>
      <span class="exercise-chevron">›</span>
    </div>
    <div class="exercise-item" data-index="7" onclick="goToExercise(7)">
      <span class="exercise-badge">8</span>
      <span class="exercise-item-title">Hip 90/90</span>
      <span class="exercise-chevron">›</span>
    </div>
    <div class="exercise-item" data-index="8" onclick="goToExercise(8)">
      <span class="exercise-badge">9</span>
      <span class="exercise-item-title">Pigeon pose</span>
      <span class="exercise-chevron">›</span>
    </div>
    <div class="exercise-item" data-index="9" onclick="goToExercise(9)">
      <span class="exercise-badge">10</span>
      <span class="exercise-item-title">Butterfly stretch</span>
      <span class="exercise-chevron">›</span>
    </div>
  </div>
</div>

<!-- Exercise screen -->
<div id="exercise-screen">
  <div class="card">
    <div class="progress-bar-track">
      <div class="progress-bar-fill" id="progress-bar-fill"></div>
    </div>
    <div class="card-header">
      <button class="btn-home" onclick="goHome()">&#9776;</button>
      <span id="progress-text"></span>
    </div>
    <div class="card-body">
      <h2 id="title"></h2>
      <p id="desc"></p>
      <h1 id="main"></h1>
      <p id="sub"></p>

      <div id="rep-section" class="rep-section" style="display:none">
        <p class="rep-label">Tap to count</p>
        <button class="rep-btn" onclick="countRep()" id="rep-btn">0</button>
        <button class="rep-reset" onclick="resetRep()">reset</button>
      </div>

      <div id="timer-controls" class="rep-section" style="display:none">
        <button class="btn-timer" id="timer-btn" onclick="toggleTimer()">Start</button>
        <button class="rep-reset" onclick="restartTimer()">restart</button>
      </div>

      <iframe id="link" class="video-embed regular" src="" frameborder="0"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
        allowfullscreen style="display:none"></iframe>

      <div class="nav">
        <button class="btn-secondary" onclick="prev()">Back</button>
        <button class="btn-primary" onclick="next()">Next</button>
      </div>
      <button class="btn-restart" onclick="restart()">Restart routine</button>
    </div>
  </div>
</div>

<script>
const routine = [
  {title: "Hip mobility", desc: "Stay within pain free range", main: "2–3 mins"},
  {title: "Hip rolling", desc: "Foam roller from pelvis, alternating with side lying", main: "10 reps x 3", countReps: true},
  {title: "Glute bridge single leg", desc: "With foam roller", main: "10–12 reps x 3 each side", countReps: true},
  {title: "Single leg squat", desc: "With weight (3kg or equivalent)", main: "8–10 reps x 3 each side", countReps: true, link: "https://www.youtube.com/watch?v=7oHiAdRQbyc"},
  {title: "Copenhagen plank", desc: "Bent knee — straight line from shoulder, hip and knee", timer: 10, sets: 8, link: "https://www.youtube.com/shorts/doyRE40wurU"},
  {title: "Split stance hinge", desc: "Weight on front leg, hinge at hips until you feel a stretch", main: "10–12 reps x 3 each side", countReps: true, link: "https://www.youtube.com/watch?v=rtCk4T6eRNg"},
  {title: "Drop jump", desc: "Step off, land and rebound as quickly and as high as possible", main: "6–8 reps x 2 sets", countReps: true, link: "https://www.youtube.com/watch?v=LrZuW-sJPBo"},
  {title: "Hip 90/90", desc: "Focus on 90/90 position", main: "1–2 mins", link: "https://www.youtube.com/shorts/PaAsDR0jyPQ"},
  {title: "Pigeon pose", desc: "Stretch back leg further to feel stretch at front of hip too", main: "1–2 mins each side", link: "https://www.youtube.com/shorts/pjmR5Kacu1w"},
  {title: "Butterfly stretch", desc: "Adductors", main: "1–2 mins", link: "https://www.youtube.com/shorts/1ZbyKG0LoSc"}
];

const REST_SECONDS = 5;

let i = 0;
let currentSet = 1;
let repCount = 0;
let intervalId = null;
let timerState = "idle"; // "idle" | "running" | "paused" | "resting" | "done"
let remainingTime = 0;
let audioCtx = null;

function getAudioContext() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  return audioCtx;
}

function playTone(frequency, startTime, duration, ctx) {
  const oscillator = ctx.createOscillator();
  const gain = ctx.createGain();
  oscillator.connect(gain);
  gain.connect(ctx.destination);
  oscillator.type = "sine";
  oscillator.frequency.setValueAtTime(frequency, startTime);
  gain.gain.setValueAtTime(0.0, startTime);
  gain.gain.linearRampToValueAtTime(0.25, startTime + 0.01);
  gain.gain.linearRampToValueAtTime(0.0, startTime + duration);
  oscillator.start(startTime);
  oscillator.stop(startTime + duration + 0.01);
}

function playSetComplete() {
  const ctx = getAudioContext();
  const now = ctx.currentTime;
  playTone(660, now, 0.15, ctx);
  playTone(880, now + 0.18, 0.15, ctx);
}

function playAllSetsComplete() {
  const ctx = getAudioContext();
  const now = ctx.currentTime;
  const notes = [523, 659, 784, 1047];
  notes.forEach(function(freq, idx) {
    playTone(freq, now + idx * 0.13, 0.18, ctx);
  });
}

function showScreen(screenId) {
  document.getElementById("home-screen").style.display = screenId === "home" ? "block" : "none";
  document.getElementById("exercise-screen").style.display = screenId === "exercise" ? "block" : "none";
}

function goHome() {
  if (intervalId) {
    clearInterval(intervalId);
    intervalId = null;
  }
  showScreen("home");
}

function goToExercise(index) {
  if (intervalId) {
    clearInterval(intervalId);
    intervalId = null;
  }
  i = index;
  currentSet = 1;
  showScreen("exercise");
  render();
}

function toEmbedUrl(url) {
  const watch = url.match(/youtube\.com\/watch\?v=([a-zA-Z0-9_-]+)/);
  if (watch) return { src: "https://www.youtube.com/embed/" + watch[1], isShort: false };
  const short = url.match(/youtube\.com\/shorts\/([a-zA-Z0-9_-]+)/);
  if (short) return { src: "https://www.youtube.com/embed/" + short[1], isShort: true };
  return { src: url, isShort: false };
}

function render() {
  const item = routine[i];

  document.getElementById("title").innerText = item.title;
  document.getElementById("desc").innerText = item.desc;

  document.getElementById("progress-text").innerText = (i + 1) + " of " + routine.length;

  const fillPct = ((i + 1) / routine.length) * 100;
  document.getElementById("progress-bar-fill").style.width = fillPct + "%";

  const linkEl = document.getElementById("link");
  if (item.link) {
    const { src, isShort } = toEmbedUrl(item.link);
    linkEl.src = src;
    linkEl.className = "video-embed " + (isShort ? "short" : "regular");
    linkEl.style.display = "block";
  } else {
    linkEl.src = "";
    linkEl.style.display = "none";
  }

  const repSection = document.getElementById("rep-section");
  if (item.countReps) {
    repCount = 0;
    document.getElementById("rep-btn").innerText = "0";
    repSection.style.display = "block";
  } else {
    repSection.style.display = "none";
  }

  const timerControls = document.getElementById("timer-controls");
  if (item.timer) {
    currentSet = 1;
    remainingTime = item.timer;
    timerState = "idle";
    document.getElementById("main").innerText = remainingTime + "s";
    document.getElementById("sub").innerText = "Set " + currentSet + " of " + item.sets;
    timerControls.style.display = "block";
    setTimerButtonLabel();
  } else {
    timerControls.style.display = "none";
    document.getElementById("main").innerText = item.main;
    document.getElementById("sub").innerText = "";
  }
}

function setTimerButtonLabel() {
  const labels = {
    idle: "Start",
    running: "Pause",
    paused: "Resume",
    resting: "Skip rest",
    done: "Start"
  };
  document.getElementById("timer-btn").innerText = labels[timerState];
}

function toggleTimer() {
  getAudioContext();
  const item = routine[i];
  if (!item.timer) return;

  if (timerState === "running") {
    clearInterval(intervalId);
    intervalId = null;
    timerState = "paused";
    setTimerButtonLabel();
  } else if (timerState === "resting") {
    clearInterval(intervalId);
    intervalId = null;
    finishRest();
  } else if (timerState === "done") {
    currentSet = 1;
    remainingTime = item.timer;
    document.getElementById("main").innerText = remainingTime + "s";
    document.getElementById("sub").innerText = "Set " + currentSet + " of " + item.sets;
    timerState = "running";
    runTimer();
    setTimerButtonLabel();
  } else {
    timerState = "running";
    runTimer();
    setTimerButtonLabel();
  }
}

function runTimer() {
  const item = routine[i];
  intervalId = setInterval(function() {
    remainingTime--;
    if (remainingTime < 0) {
      clearInterval(intervalId);
      intervalId = null;
      currentSet++;
      if (currentSet <= item.sets) {
        playSetComplete();
        startRest();
      } else {
        playAllSetsComplete();
        document.getElementById("main").innerText = "Done";
        document.getElementById("sub").innerText = "";
        timerState = "done";
        setTimerButtonLabel();
      }
    } else {
      document.getElementById("main").innerText = remainingTime + "s";
    }
  }, 1000);
}

function startRest() {
  const item = routine[i];
  timerState = "resting";
  remainingTime = REST_SECONDS;
  document.getElementById("main").innerText = remainingTime + "s";
  document.getElementById("sub").innerText = "Rest before set " + currentSet + " of " + item.sets;
  setTimerButtonLabel();
  intervalId = setInterval(function() {
    remainingTime--;
    if (remainingTime < 0) {
      clearInterval(intervalId);
      intervalId = null;
      finishRest();
    } else {
      document.getElementById("main").innerText = remainingTime + "s";
    }
  }, 1000);
}

function finishRest() {
  const item = routine[i];
  remainingTime = item.timer;
  timerState = "idle";
  document.getElementById("main").innerText = remainingTime + "s";
  document.getElementById("sub").innerText = "Set " + currentSet + " of " + item.sets;
  setTimerButtonLabel();
}

function restartTimer() {
  const item = routine[i];
  if (!item.timer) return;
  if (intervalId) {
    clearInterval(intervalId);
    intervalId = null;
  }
  currentSet = 1;
  remainingTime = item.timer;
  timerState = "idle";
  document.getElementById("main").innerText = remainingTime + "s";
  document.getElementById("sub").innerText = "Set " + currentSet + " of " + item.sets;
  setTimerButtonLabel();
}

function countRep() {
  getAudioContext();
  repCount++;
  document.getElementById("rep-btn").innerText = repCount;
}

function resetRep() {
  repCount = 0;
  document.getElementById("rep-btn").innerText = "0";
}

function next() {
  if (intervalId) {
    clearInterval(intervalId);
    intervalId = null;
  }
  i = (i + 1) % routine.length;
  currentSet = 1;
  render();
}

function prev() {
  if (intervalId) {
    clearInterval(intervalId);
    intervalId = null;
  }
  if (i === 0) {
    goHome();
    return;
  }
  i = i - 1;
  currentSet = 1;
  render();
}

function restart() {
  if (intervalId) {
    clearInterval(intervalId);
    intervalId = null;
  }
  i = 0;
  currentSet = 1;
  render();
}

showScreen("home");
</script>

</body>
</html>
