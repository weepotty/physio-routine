<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Fix My Hip</title>
<style>
  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    touch-action: manipulation;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: linear-gradient(160deg, #f0f4ff 0%, #e8f0fe 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 0 0 40px;
  }

  /* ── Home hero ───────────────────────────────── */

  .home-hero {
    background: linear-gradient(150deg, #1e2d5a 0%, #2d3f80 100%);
    padding: 48px 28px 36px;
    text-align: center;
    color: white;
    width: 100%;
  }

  .home-hero h1 {
    font-size: 30px;
    font-weight: 800;
    letter-spacing: -0.5px;
    margin-bottom: 6px;
  }

  .home-hero p {
    font-size: 15px;
    opacity: 0.7;
    font-weight: 500;
  }

  /* ── Day picker screen ───────────────────────── */

  #day-screen {
    width: 100%;
    max-width: 480px;
  }

  .day-cards {
    background: white;
    margin: -1px 16px 0;
    border-radius: 18px;
    box-shadow: 0 8px 30px rgba(30, 45, 90, 0.13);
    overflow: hidden;
    position: relative;
    top: -16px;
  }

  .day-card {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 20px;
    cursor: pointer;
    border-bottom: 1px solid #f0f2f8;
    transition: background 0.15s;
    -webkit-tap-highlight-color: transparent;
  }

  .day-card:last-child {
    border-bottom: none;
  }

  .day-card:hover,
  .day-card:active {
    background: #f5f7ff;
  }

  .day-pill {
    flex-shrink: 0;
    padding: 5px 11px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.4px;
    text-transform: uppercase;
  }

  .day-pill-1 {
    background: #eef0fd;
    color: #3d52c7;
  }

  .day-pill-2 {
    background: #eef8fd;
    color: #1a7fa6;
  }

  .day-pill-run {
    background: #eefdf3;
    color: #16a34a;
  }

  .day-info {
    flex: 1;
  }

  .day-title {
    font-size: 17px;
    font-weight: 700;
    color: #1a1f36;
    margin-bottom: 2px;
  }

  .day-sub {
    font-size: 13px;
    color: #8892c0;
  }

  /* ── Exercise list screen ────────────────────── */

  #list-screen {
    width: 100%;
    max-width: 480px;
  }

  .home-list-card {
    background: white;
    margin: -1px 16px 0;
    border-radius: 18px;
    box-shadow: 0 8px 30px rgba(30, 45, 90, 0.13);
    overflow: hidden;
    position: relative;
    top: -16px;
  }

  .exercise-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 15px 20px;
    cursor: pointer;
    border-bottom: 1px solid #f0f2f8;
    transition: background 0.15s;
    -webkit-tap-highlight-color: transparent;
    text-align: left;
  }

  .exercise-item:last-child {
    border-bottom: none;
  }

  .exercise-item:hover,
  .exercise-item:active {
    background: #f5f7ff;
  }

  .exercise-badge {
    flex-shrink: 0;
    width: 28px;
    height: 28px;
    border-radius: 8px;
    background: #eef0fd;
    color: #3d52c7;
    font-size: 13px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .exercise-item-title {
    flex: 1;
    font-size: 15px;
    font-weight: 500;
    color: #1a1f36;
  }

  .exercise-chevron {
    flex-shrink: 0;
    color: #c0c5d8;
    font-size: 18px;
    font-weight: 400;
    line-height: 1;
  }

  .btn-back-to-days {
    display: block;
    text-align: center;
    width: calc(100% - 32px);
    margin: 8px 16px 0;
    padding: 12px;
    font-size: 14px;
    color: #8892c0;
    background: none;
    border: none;
    cursor: pointer;
    transition: color 0.15s;
  }

  .btn-back-to-days:hover {
    color: #4a5280;
  }

  /* ── Exercise screen ─────────────────────────── */

  #exercise-screen {
    display: none;
    width: 100%;
    max-width: 480px;
    padding: 20px 16px 0;
  }

  .card {
    background: white;
    border-radius: 20px;
    box-shadow: 0 8px 30px rgba(30, 45, 90, 0.13);
    overflow: hidden;
  }

  .progress-bar-track {
    height: 4px;
    background: #eef0fd;
    width: 100%;
  }

  .progress-bar-fill {
    height: 4px;
    background: linear-gradient(90deg, #4f63d2, #7c8ff0);
    transition: width 0.35s ease;
  }

  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px 0;
  }

  .btn-home {
    background: none;
    border: none;
    font-size: 20px;
    color: #8892c0;
    cursor: pointer;
    padding: 4px 6px;
    border-radius: 8px;
    line-height: 1;
    transition: background 0.15s, color 0.15s;
    -webkit-tap-highlight-color: transparent;
  }

  .btn-home:hover {
    background: #f0f2ff;
    color: #3d52c7;
  }

  #progress-text {
    font-size: 13px;
    font-weight: 600;
    color: #8892c0;
    letter-spacing: 0.3px;
  }

  .card-body {
    padding: 12px 24px 24px;
    text-align: center;
  }

  #title {
    font-size: 24px;
    font-weight: 800;
    color: #1a1f36;
    letter-spacing: -0.4px;
    margin-bottom: 6px;
    line-height: 1.2;
  }

  #desc {
    font-size: 14px;
    color: #7a82a6;
    margin-bottom: 20px;
    line-height: 1.45;
  }

  #main {
    font-size: 46px;
    font-weight: 800;
    color: #1a1f36;
    letter-spacing: -1px;
    line-height: 1.05;
    margin-bottom: 4px;
  }

  #sub {
    font-size: 14px;
    color: #7a82a6;
    font-weight: 500;
    min-height: 20px;
    margin-bottom: 4px;
  }

  .rep-section {
    margin-top: 16px;
  }

  .rep-label {
    font-size: 12px;
    font-weight: 600;
    color: #a0a8c8;
    letter-spacing: 0.6px;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .rep-btn {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    font-size: 40px;
    font-weight: 800;
    background: linear-gradient(145deg, #4f63d2, #3d52c7);
    color: white;
    border: none;
    cursor: pointer;
    display: block;
    margin: 0 auto;
    line-height: 1;
    box-shadow: 0 4px 16px rgba(79, 99, 210, 0.35);
    transition: transform 0.1s, box-shadow 0.1s;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }

  .rep-btn:active {
    transform: scale(0.93);
    box-shadow: 0 2px 8px rgba(79, 99, 210, 0.25);
  }

  .rep-reset {
    background: none;
    color: #b0b8d8;
    font-size: 13px;
    padding: 6px 14px;
    margin-top: 8px;
    border: none;
    cursor: pointer;
    transition: color 0.15s;
  }

  .rep-reset:hover {
    color: #7a82a6;
  }

  .rep-set-text {
    font-size: 13px;
    font-weight: 600;
    color: #8892c0;
    letter-spacing: 0.3px;
    min-height: 20px;
    margin-bottom: 8px;
  }

  .rep-set-complete {
    color: #22c55e;
    font-size: 15px;
  }

  .rep-btn.done {
    background: linear-gradient(145deg, #22c55e, #16a34a);
    box-shadow: 0 4px 16px rgba(34, 197, 94, 0.35);
  }

  .btn-voice {
    background: none;
    color: #b0b8d8;
    font-size: 13px;
    padding: 6px 16px;
    margin-top: 6px;
    border: 1px solid #e8ebf5;
    border-radius: 8px;
    cursor: pointer;
    display: block;
    margin-left: auto;
    margin-right: auto;
    transition: color 0.15s, border-color 0.15s, background 0.15s;
  }

  .btn-voice:hover {
    color: #7a82a6;
    border-color: #c8cee0;
  }

  .btn-voice.listening {
    color: #e53e3e;
    border-color: #feb2b2;
    background: #fff5f5;
  }

  @keyframes mic-pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.25; }
  }

  .btn-voice.listening::before {
    content: "";
    display: inline-block;
    width: 7px;
    height: 7px;
    background: #e53e3e;
    border-radius: 50%;
    margin-right: 6px;
    vertical-align: middle;
    animation: mic-pulse 1s infinite;
  }

  .btn-timer {
    width: 140px;
    padding: 14px 24px;
    font-size: 16px;
    font-weight: 700;
    border-radius: 12px;
    border: none;
    background: linear-gradient(135deg, #4f63d2, #3d52c7);
    color: white;
    cursor: pointer;
    box-shadow: 0 4px 14px rgba(79, 99, 210, 0.3);
    transition: opacity 0.15s, box-shadow 0.15s;
    -webkit-tap-highlight-color: transparent;
    display: block;
    margin: 0 auto;
  }

  .btn-timer:hover {
    opacity: 0.92;
    box-shadow: 0 6px 18px rgba(79, 99, 210, 0.38);
  }

  .video-embed {
    display: block;
    width: 100%;
    margin-top: 16px;
    border: none;
    border-radius: 10px;
    background: #000;
  }

  .video-embed.regular {
    aspect-ratio: 16 / 9;
  }

  .video-embed.short {
    aspect-ratio: 9 / 16;
    max-height: 380px;
    width: auto;
    max-width: 215px;
    margin-left: auto;
    margin-right: auto;
  }

  .nav {
    display: flex;
    gap: 10px;
    margin-top: 24px;
  }

  .btn-secondary {
    flex: 1;
    padding: 15px 20px;
    font-size: 16px;
    font-weight: 600;
    border-radius: 12px;
    border: 2px solid #dde1f0;
    background: white;
    color: #4a5280;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    -webkit-tap-highlight-color: transparent;
  }

  .btn-secondary:hover {
    background: #f5f7ff;
    border-color: #c0c8e8;
  }

  .btn-primary {
    flex: 1;
    padding: 15px 20px;
    font-size: 16px;
    font-weight: 700;
    border-radius: 12px;
    border: none;
    background: linear-gradient(135deg, #4f63d2, #3d52c7);
    color: white;
    cursor: pointer;
    box-shadow: 0 4px 14px rgba(79, 99, 210, 0.3);
    transition: opacity 0.15s, box-shadow 0.15s;
    -webkit-tap-highlight-color: transparent;
  }

  .btn-primary:hover {
    opacity: 0.92;
    box-shadow: 0 6px 18px rgba(79, 99, 210, 0.38);
  }

  .btn-restart {
    background: none;
    color: #c0c8d8;
    font-size: 13px;
    padding: 8px 16px;
    margin-top: 12px;
    border: 1px solid #e8ebf5;
    border-radius: 8px;
    cursor: pointer;
    display: block;
    margin-left: auto;
    margin-right: auto;
    transition: color 0.15s, border-color 0.15s;
  }

  .btn-restart:hover {
    color: #7a82a6;
    border-color: #c8cee0;
  }
</style>
</head>

<body>

<!-- Day picker screen -->
<div id="day-screen">
  <div class="home-hero">
    <h1>Fix My Hip</h1>
    <p>Physio &amp; running programme</p>
  </div>
  <div class="day-cards">
    <div class="day-card" onclick="selectDay('day1')">
      <div class="day-pill day-pill-1">Day 1</div>
      <div class="day-info">
        <div class="day-title">Plyometrics</div>
        <div class="day-sub">Drop jumps · Skaters · Squat jumps</div>
      </div>
      <span class="exercise-chevron">›</span>
    </div>
    <div class="day-card" onclick="selectDay('day2')">
      <div class="day-pill day-pill-2">Day 2</div>
      <div class="day-info">
        <div class="day-title">Strength</div>
        <div class="day-sub">Single leg squat · Copenhagen · Hip flexor</div>
      </div>
      <span class="exercise-chevron">›</span>
    </div>
    <div class="day-card" onclick="startRun()">
      <div class="day-pill day-pill-run">Run</div>
      <div class="day-info">
        <div class="day-title">Run 1</div>
        <div class="day-sub">Half-speed intervals · 24 min</div>
      </div>
      <span class="exercise-chevron">›</span>
    </div>
  </div>
</div>

<!-- Exercise list screen -->
<div id="list-screen" style="display:none">
  <div class="home-hero">
    <h1 id="list-day-title"></h1>
    <p id="list-day-sub"></p>
  </div>
  <div class="home-list-card" id="exercise-list"></div>
  <button class="btn-back-to-days" onclick="goToDayPicker()">← Change day</button>
</div>

<!-- Exercise screen -->
<div id="exercise-screen" style="display:none">
  <div class="card">
    <div class="progress-bar-track">
      <div class="progress-bar-fill" id="progress-bar-fill"></div>
    </div>
    <div class="card-header">
      <button class="btn-home" onclick="goHome()">&#9776;</button>
      <span id="progress-text"></span>
    </div>
    <div class="card-body">
      <h2 id="title"></h2>
      <p id="desc"></p>
      <h1 id="main"></h1>
      <p id="sub"></p>

      <div id="rep-section" class="rep-section" style="display:none">
        <p id="rep-set-text" class="rep-set-text"></p>
        <button class="rep-btn" onclick="countRep()" id="rep-btn">0</button>
        <button class="rep-reset" onclick="resetRep()">reset</button>
        <button class="btn-voice" id="voice-btn" style="display:none" onclick="toggleVoice()">🎙 Voice</button>
      </div>

      <div id="timer-controls" class="rep-section" style="display:none">
        <button class="btn-timer" id="timer-btn" onclick="toggleTimer()">Start</button>
        <button class="rep-reset" onclick="restartTimer()">restart</button>
      </div>

      <iframe id="link" class="video-embed regular" src="" frameborder="0"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
        allowfullscreen style="display:none"></iframe>

      <div class="nav">
        <button class="btn-secondary" onclick="prev()">Back</button>
        <button class="btn-primary" onclick="next()">Next</button>
      </div>
      <button class="btn-restart" onclick="restart()">Restart routine</button>
    </div>
  </div>
</div>

<!-- Run screen -->
<div id="run-screen" style="display:none">
  <div class="card" style="margin: 20px 16px 0">
    <div class="card-header">
      <button class="btn-home" onclick="goToDayPicker()">&#9776;</button>
      <span id="run-round-text" class="run-round-text"></span>
    </div>
    <div class="card-body" style="padding-top: 36px; padding-bottom: 44px; text-align: center">
      <div id="run-phase-label" class="run-phase-label"></div>
      <div id="run-countdown" class="run-countdown"></div>
      <div id="run-next-hint" class="run-next-hint"></div>
      <button class="btn-timer" id="run-btn" onclick="toggleRunTimer()" style="margin-top: 32px">Start</button>
      <button class="btn-restart" id="run-restart-btn" onclick="restartRun()" style="display:none">Start over</button>
    </div>
  </div>
</div>

<script>
const mobility = [
  {title: "Hip 90/90", desc: "Focus on the 90/90 position", main: "1–2 mins", countdown: 90, link: "https://www.youtube.com/shorts/PaAsDR0jyPQ"},
  {title: "Pigeon pose", desc: "Stretch back leg further to feel a stretch at the front of the hip too", main: "1–2 mins each side", countdown: 90, link: "https://www.youtube.com/shorts/pjmR5Kacu1w"},
  {title: "Butterfly stretch", desc: "Adductor stretch", main: "1–2 mins", countdown: 90, link: "https://www.youtube.com/shorts/1ZbyKG0LoSc"}
];

const routines = {
  day1: [
    {title: "Single leg drop jump", desc: "Single leg — step off, land and rebound as quickly and as high as possible", main: "10 reps x 2 sets both sides", reps: 10, repSets: 2, countReps: true, link: "https://www.youtube.com/shorts/RCsTwGzAq2w"},
    {title: "Skaters", desc: "Push with adductors, jump to one side, land and repeat the other side. Push further as you get more confident", main: "16 reps x 2 sets", reps: 16, repSets: 2, countReps: true, link: "https://www.youtube.com/shorts/IkGOdk2VDJw"},
    {title: "Squat jumps", desc: "Double leg jump as high as you can, land in a deep squat to absorb force and repeat", main: "10 reps x 2 sets", reps: 10, repSets: 2, countReps: true},
    {title: "Hip rolling", desc: "Foam roller from pelvis, alternating with side lying", main: "10 reps x 3", reps: 10, repSets: 3, countReps: true},
    ...mobility
  ],
  day2: [
    {title: "Single leg squat with weight", desc: "Use 5kg or a bottle; increase weight as it gets easier", main: "8–10 reps x 3 both sides", reps: 10, repSets: 3, countReps: true, link: "https://www.youtube.com/watch?v=7oHiAdRQbyc"},
    {title: "Mid knee Copenhagen", desc: "Set up on bench with mid shin. Straight line from shoulder, hip and knee. Use adductors and opposite obliques. Increase hold time as it gets easier", timer: 10, sets: 8, link: "https://www.youtube.com/watch?v=CxDEpYh6oQI"},
    {title: "Weighted hip flexor raise", desc: "Shopping bag with bottle or can. Hold 2–3 seconds per rep", main: "8 reps x 2 sets both sides", reps: 8, repSets: 2, countReps: true, link: "https://www.youtube.com/shorts/KoQrZsENTNQ"},
    {title: "Hip rolling", desc: "Foam roller from pelvis, alternating with side lying", main: "10 reps x 3", reps: 10, repSets: 3, countReps: true},
    ...mobility
  ]
};

const REST_SECONDS = 5;

let routine = [];
let activeDay = null;
let i = 0;
let currentSet = 1;
let repCount = 0;
let intervalId = null;
let timerState = "idle"; // "idle" | "running" | "paused" | "resting" | "done"
let remainingTime = 0;
let audioCtx = null;
let repCurrentSet = 1;
let repSetsDone = false;
let voiceMode = false;
let micStream = null;
let micSource = null;
let micAnalyser = null;
let micDataArray = null;
let micRafId = null;
let lastTriggerAt = 0;
// Peak amplitude threshold (0–1) — louder than ambient room noise but easy to hit with a clap or grunt
const SOUND_THRESHOLD = 0.15;
const TRIGGER_COOLDOWN_MS = 350;

function getAudioContext() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  return audioCtx;
}

function playTone(frequency, startTime, duration, ctx) {
  const oscillator = ctx.createOscillator();
  const gain = ctx.createGain();
  oscillator.connect(gain);
  gain.connect(ctx.destination);
  oscillator.type = "sine";
  oscillator.frequency.setValueAtTime(frequency, startTime);
  gain.gain.setValueAtTime(0.0, startTime);
  gain.gain.linearRampToValueAtTime(0.25, startTime + 0.01);
  gain.gain.linearRampToValueAtTime(0.0, startTime + duration);
  oscillator.start(startTime);
  oscillator.stop(startTime + duration + 0.01);
}

function playSetComplete() {
  const ctx = getAudioContext();
  const now = ctx.currentTime;
  playTone(660, now, 0.15, ctx);
  playTone(880, now + 0.18, 0.15, ctx);
}

function playAllSetsComplete() {
  const ctx = getAudioContext();
  const now = ctx.currentTime;
  const notes = [523, 659, 784, 1047];
  notes.forEach(function(freq, idx) {
    playTone(freq, now + idx * 0.13, 0.18, ctx);
  });
}

function playGo() {
  const ctx = getAudioContext();
  const now = ctx.currentTime;
  playTone(880, now, 0.12, ctx);
  playTone(1175, now + 0.14, 0.18, ctx);
}

function updateVoiceButton(label) {
  const btn = document.getElementById("voice-btn");
  if (!btn) return;
  if (voiceMode) {
    btn.innerText = label || "Listening…";
    btn.classList.add("listening");
  } else {
    btn.innerText = "🎙 Voice";
    btn.classList.remove("listening");
  }
}

function tickVolume() {
  if (!voiceMode || !micAnalyser) return;
  micAnalyser.getByteTimeDomainData(micDataArray);
  let peak = 0;
  for (let i = 0; i < micDataArray.length; i++) {
    const v = Math.abs(micDataArray[i] - 128) / 128;
    if (v > peak) peak = v;
  }
  const now = performance.now();
  if (peak > SOUND_THRESHOLD && now - lastTriggerAt > TRIGGER_COOLDOWN_MS) {
    lastTriggerAt = now;
    countRep();
  }
  micRafId = requestAnimationFrame(tickVolume);
}

async function toggleVoice() {
  if (voiceMode) { stopVoice(); return; }
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    alert("Microphone access is not supported in this browser.");
    return;
  }
  voiceMode = true;
  updateVoiceButton("Starting…");
  try {
    micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
  } catch (e) {
    voiceMode = false;
    updateVoiceButton();
    if (e && e.name === "NotAllowedError") {
      alert("Microphone permission denied. Enable mic access in your browser settings.");
    } else {
      alert("Could not access the microphone.");
    }
    return;
  }
  if (!voiceMode) {
    // User toggled off while permission prompt was open
    micStream.getTracks().forEach(function(t) { t.stop(); });
    micStream = null;
    return;
  }
  const ctx = getAudioContext();
  if (ctx.state === "suspended") {
    try { await ctx.resume(); } catch(e) {}
  }
  micSource = ctx.createMediaStreamSource(micStream);
  micAnalyser = ctx.createAnalyser();
  micAnalyser.fftSize = 256;
  micAnalyser.smoothingTimeConstant = 0;
  micSource.connect(micAnalyser);
  micDataArray = new Uint8Array(micAnalyser.fftSize);
  lastTriggerAt = 0;
  updateVoiceButton();
  tickVolume();
}

function stopVoice() {
  voiceMode = false;
  if (micRafId) { cancelAnimationFrame(micRafId); micRafId = null; }
  if (micSource) { try { micSource.disconnect(); } catch(e) {} micSource = null; }
  micAnalyser = null;
  micDataArray = null;
  if (micStream) {
    micStream.getTracks().forEach(function(t) { t.stop(); });
    micStream = null;
  }
  updateVoiceButton();
}

function showScreen(screenId) {
  document.getElementById("day-screen").style.display = screenId === "day" ? "block" : "none";
  document.getElementById("list-screen").style.display = screenId === "list" ? "block" : "none";
  document.getElementById("exercise-screen").style.display = screenId === "exercise" ? "block" : "none";
}

function goToDayPicker() {
  if (intervalId) { clearInterval(intervalId); intervalId = null; }
  stopVoice();
  showScreen("day");
}

function goHome() {
  if (intervalId) { clearInterval(intervalId); intervalId = null; }
  stopVoice();
  showScreen("list");
}

function selectDay(day) {
  activeDay = day;
  routine = routines[day];
  renderList();
  showScreen("list");
}

function renderList() {
  const titles = { day1: "Day 1 · Plyometrics", day2: "Day 2 · Strength" };
  document.getElementById("list-day-title").innerText = titles[activeDay];
  document.getElementById("list-day-sub").innerText = routine.length + " exercises";

  const listEl = document.getElementById("exercise-list");
  listEl.innerHTML = routine.map(function(ex, idx) {
    return '<div class="exercise-item" onclick="goToExercise(' + idx + ')">'
      + '<span class="exercise-badge">' + (idx + 1) + '</span>'
      + '<span class="exercise-item-title">' + ex.title + '</span>'
      + '<span class="exercise-chevron">›</span>'
      + '</div>';
  }).join("");
}

function goToExercise(index) {
  if (intervalId) {
    clearInterval(intervalId);
    intervalId = null;
  }
  i = index;
  currentSet = 1;
  showScreen("exercise");
  render();
}

function toEmbedUrl(url) {
  const watch = url.match(/youtube\.com\/watch\?v=([a-zA-Z0-9_-]+)/);
  if (watch) return { src: "https://www.youtube.com/embed/" + watch[1], isShort: false };
  const short = url.match(/youtube\.com\/shorts\/([a-zA-Z0-9_-]+)/);
  if (short) return { src: "https://www.youtube.com/embed/" + short[1], isShort: true };
  return { src: url, isShort: false };
}

function render() {
  const item = routine[i];

  document.getElementById("title").innerText = item.title;
  document.getElementById("desc").innerText = item.desc;

  document.getElementById("progress-text").innerText = (i + 1) + " of " + routine.length;

  const fillPct = ((i + 1) / routine.length) * 100;
  document.getElementById("progress-bar-fill").style.width = fillPct + "%";

  const linkEl = document.getElementById("link");
  if (item.link) {
    const { src, isShort } = toEmbedUrl(item.link);
    linkEl.src = src;
    linkEl.className = "video-embed " + (isShort ? "short" : "regular");
    linkEl.style.display = "block";
  } else {
    linkEl.src = "";
    linkEl.style.display = "none";
  }

  const repSection = document.getElementById("rep-section");
  if (item.countReps) {
    repCount = 0;
    repCurrentSet = 1;
    repSetsDone = false;
    const repBtn = document.getElementById("rep-btn");
    repBtn.innerText = "0";
    repBtn.classList.remove("done");
    const repSetText = document.getElementById("rep-set-text");
    repSetText.innerText = item.repSets ? "Set 1 of " + item.repSets : "";
    repSetText.className = "rep-set-text";
    const voiceBtn = document.getElementById("voice-btn");
    voiceBtn.style.display = (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) ? "block" : "none";
    repSection.style.display = "block";
  } else {
    stopVoice();
    repSection.style.display = "none";
  }

  const timerControls = document.getElementById("timer-controls");
  const isTimerEx = item.timer || item.countdown;
  if (isTimerEx) {
    const duration = item.timer || item.countdown;
    const numSets = item.sets || 1;
    currentSet = 1;
    remainingTime = duration;
    timerState = "idle";
    document.getElementById("main").innerText = formatTime(remainingTime);
    document.getElementById("sub").innerText = numSets > 1 ? "Set " + currentSet + " of " + numSets : (item.main || "");
    timerControls.style.display = "block";
    setTimerButtonLabel();
  } else {
    timerControls.style.display = "none";
    document.getElementById("main").innerText = item.main || "";
    document.getElementById("sub").innerText = "";
  }
}

function formatTime(seconds) {
  const item = routine[i];
  const duration = item.timer || item.countdown || 0;
  if (duration >= 60) {
    const m = Math.floor(seconds / 60);
    const s = seconds % 60;
    return m + ":" + (s < 10 ? "0" : "") + s;
  }
  return seconds + "s";
}

function setTimerButtonLabel() {
  const labels = {
    idle: "Start",
    running: "Pause",
    paused: "Resume",
    resting: "Skip rest",
    done: "Start"
  };
  document.getElementById("timer-btn").innerText = labels[timerState];
}

function toggleTimer() {
  getAudioContext();
  const item = routine[i];
  if (!item.timer && !item.countdown) return;
  const duration = item.timer || item.countdown;
  const numSets = item.sets || 1;

  if (timerState === "running") {
    clearInterval(intervalId);
    intervalId = null;
    timerState = "paused";
    setTimerButtonLabel();
  } else if (timerState === "resting") {
    clearInterval(intervalId);
    intervalId = null;
    finishRest();
  } else if (timerState === "done") {
    currentSet = 1;
    remainingTime = duration;
    document.getElementById("main").innerText = formatTime(remainingTime);
    document.getElementById("sub").innerText = numSets > 1 ? "Set " + currentSet + " of " + numSets : (item.main || "");
    timerState = "running";
    runTimer();
    setTimerButtonLabel();
  } else {
    timerState = "running";
    runTimer();
    setTimerButtonLabel();
  }
}

function runTimer() {
  const item = routine[i];
  intervalId = setInterval(function() {
    remainingTime--;
    if (remainingTime < 0) {
      clearInterval(intervalId);
      intervalId = null;
      currentSet++;
      if (currentSet <= (item.sets || 1)) {
        playSetComplete();
        startRest();
      } else {
        playAllSetsComplete();
        document.getElementById("main").innerText = "Done";
        document.getElementById("sub").innerText = "";
        timerState = "done";
        setTimerButtonLabel();
      }
    } else {
      document.getElementById("main").innerText = formatTime(remainingTime);
    }
  }, 1000);
}

function startRest() {
  const item = routine[i];
  timerState = "resting";
  remainingTime = REST_SECONDS;
  document.getElementById("main").innerText = remainingTime + "s";
  document.getElementById("sub").innerText = "Rest before set " + currentSet + " of " + item.sets;
  setTimerButtonLabel();
  intervalId = setInterval(function() {
    remainingTime--;
    if (remainingTime < 0) {
      clearInterval(intervalId);
      intervalId = null;
      finishRest();
    } else {
      document.getElementById("main").innerText = remainingTime + "s";
    }
  }, 1000);
}

function finishRest() {
  const item = routine[i];
  const numSets = item.sets || 1;
  remainingTime = item.timer || item.countdown;
  timerState = "running";
  document.getElementById("main").innerText = formatTime(remainingTime);
  document.getElementById("sub").innerText = numSets > 1 ? "Set " + currentSet + " of " + numSets : (item.main || "");
  setTimerButtonLabel();
  playGo();
  runTimer();
}

function restartTimer() {
  const item = routine[i];
  if (!item.timer && !item.countdown) return;
  const duration = item.timer || item.countdown;
  const numSets = item.sets || 1;
  if (intervalId) {
    clearInterval(intervalId);
    intervalId = null;
  }
  currentSet = 1;
  remainingTime = duration;
  timerState = "idle";
  document.getElementById("main").innerText = formatTime(remainingTime);
  document.getElementById("sub").innerText = numSets > 1 ? "Set " + currentSet + " of " + numSets : (item.main || "");
  setTimerButtonLabel();
}

function countRep() {
  if (repSetsDone) return;
  getAudioContext();
  repCount++;
  document.getElementById("rep-btn").innerText = repCount;

  const item = routine[i];
  if (!item.reps) return;

  if (repCount >= item.reps) {
    const repSetText = document.getElementById("rep-set-text");
    if (item.repSets && repCurrentSet < item.repSets) {
      playSetComplete();
      repCurrentSet++;
      repCount = 0;
      document.getElementById("rep-btn").innerText = "0";
      repSetText.innerText = "Set " + repCurrentSet + " of " + item.repSets;
    } else {
      playAllSetsComplete();
      repSetsDone = true;
      document.getElementById("rep-btn").classList.add("done");
      repSetText.innerText = "All done!";
      repSetText.className = "rep-set-text rep-set-complete";
    }
  }
}

function resetRep() {
  const item = routine[i];
  repCount = 0;
  repCurrentSet = 1;
  repSetsDone = false;
  const repBtn = document.getElementById("rep-btn");
  repBtn.innerText = "0";
  repBtn.classList.remove("done");
  const repSetText = document.getElementById("rep-set-text");
  repSetText.innerText = item.repSets ? "Set 1 of " + item.repSets : "";
  repSetText.className = "rep-set-text";
}

function next() {
  if (intervalId) { clearInterval(intervalId); intervalId = null; }
  stopVoice();
  if (i >= routine.length - 1) { goHome(); return; }
  i++;
  currentSet = 1;
  render();
}

function prev() {
  if (intervalId) { clearInterval(intervalId); intervalId = null; }
  stopVoice();
  if (i === 0) { goHome(); return; }
  i--;
  currentSet = 1;
  render();
}

function restart() {
  if (intervalId) { clearInterval(intervalId); intervalId = null; }
  stopVoice();
  i = 0;
  currentSet = 1;
  render();
}

showScreen("day");
</script>

</body>
</html>
